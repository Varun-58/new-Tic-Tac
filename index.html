<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="title">Tic Tac Toe</div>
    <div class="o">O : 🏆<span class="oWin">0</span> | 😥<span class="oLoss">0</span></div>
    <div class="x">X : 🏆<span class="xWin">0</span> | 😥<span class="xLoss">0</span></div>
  </header>
  <main>
    <section class="s1">
      <div class="G-container-spin">
        <div class="G-container">
          <div class="G-wl"></div>
          <button class="G-btn b-r b-b br-l"></button>
          <button class="G-btn b-l b-b b-r"></button>
          <button class="G-btn b-l b-b b-r"></button>
          <button class="G-btn b-l b-b br-r"></button>
          <button class="G-btn b-t b-r b-b"></button>
          <button class="G-btn b-t b-r b-b b-l"></button>
          <button class="G-btn b-t b-r b-b b-l"></button>
          <button class="G-btn b-t b-l b-b"></button>
          <button class="G-btn b-t b-r b-b"></button>
          <button class="G-btn b-t b-r b-b b-l"></button>
          <button class="G-btn b-t b-r b-b b-l"></button>
          <button class="G-btn b-t b-l b-b"></button>
          <button class="G-btn b-t b-r br-bl"></button>
          <button class="G-btn b-l b-t b-r"></button>
          <button class="G-btn b-l b-t b-r"></button>
          <button class="G-btn b-l b-t br-br"></button>
        </div>
      </div>
      <div class="controler">
        <div class="G-con-text"></div>
        <div class="controls">
          <button class="ctrl newGame">New Game</button>
          <button class="ctrl playGame">⭮ Play</button>
        </div>
      </div>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
